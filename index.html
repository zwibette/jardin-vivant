<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d1a0f">
<title>Jardin Vivant</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,200&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a120b;--bg3:#142016;--surface:#1a2e1c;--surface2:#203524;
  --border:#2a4030;--green:#4ade80;--green-dark:#166534;
  --amber:#fbbf24;--red:#f87171;
  --text:#e8f5ea;--text-dim:#8fb898;--text-muted:#4a6b52;--accent:#a3e635;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(74,222,128,.05) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(163,230,53,.04) 0%,transparent 50%);pointer-events:none;z-index:0}
header{position:sticky;top:0;z-index:100;background:rgba(10,18,11,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 20px}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:60px}
.logo{font-family:'Fraunces',serif;font-size:1.3rem;font-weight:300;color:var(--accent);display:flex;align-items:center;gap:10px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.header-status{font-size:.7rem;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase}
.status-ok{color:var(--green)}.status-err{color:var(--red)}.status-warn{color:var(--amber)}
.refresh-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-dim);padding:6px 14px;border-radius:6px;font-family:'DM Mono',monospace;font-size:.7rem;cursor:pointer;transition:all .2s}
.refresh-btn.spinning{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
main{max-width:1200px;margin:0 auto;padding:24px 20px;position:relative;z-index:1}
.nav-tabs{display:flex;gap:4px;margin-bottom:24px;background:var(--surface);padding:4px;border-radius:10px;border:1px solid var(--border)}
.tab{flex:1;padding:10px 8px;border:none;background:transparent;color:var(--text-muted);font-family:'DM Mono',monospace;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border-radius:7px;transition:all .2s}
.tab.active{background:var(--bg3);color:var(--accent);border:1px solid var(--border)}
.section{display:none}.section.active{display:block}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
.mb-16{margin-bottom:16px}.mb-24{margin-bottom:24px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;position:relative;overflow:hidden;transition:border-color .2s}
.card:hover{border-color:var(--green-dark)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--green-dark),transparent);opacity:.5}
.card-label{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.card-value{font-family:'Fraunces',serif;font-size:2.4rem;font-weight:300;color:var(--text);line-height:1;margin-bottom:4px}
.card-unit{font-size:.8rem;color:var(--text-muted)}
.card-sub{font-size:.7rem;color:var(--text-muted);margin-top:8px}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot-green{background:var(--green);box-shadow:0 0 6px var(--green)}
.dot-amber{background:var(--amber);box-shadow:0 0 6px var(--amber)}
.dot-red{background:var(--red);box-shadow:0 0 6px var(--red)}
.dot-gray{background:var(--text-muted)}
.section-title{font-family:'Fraunces',serif;font-size:1.1rem;font-weight:300;font-style:italic;color:var(--text-dim);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.section-title span{font-size:.65rem;letter-spacing:.1em;font-style:normal;font-family:'DM Mono',monospace;color:var(--text-muted)}
.device-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;display:flex;flex-direction:column;gap:12px;transition:all .2s}
.device-card:hover{border-color:var(--green-dark)}
.device-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.device-name{font-size:.78rem;color:var(--text);line-height:1.3;flex:1}
.device-type{font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-top:2px}
.toggle{position:relative;width:42px;height:24px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--bg3);border:1px solid var(--border);border-radius:24px;cursor:pointer;transition:all .3s}
.toggle-slider::before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:var(--text-muted);border-radius:50%;transition:all .3s}
.toggle input:checked+.toggle-slider{background:var(--green-dark);border-color:var(--green)}
.toggle input:checked+.toggle-slider::before{transform:translateX(18px);background:var(--green);box-shadow:0 0 8px var(--green)}
.ph-bar{height:6px;background:var(--bg3);border-radius:3px;margin-top:8px;position:relative;overflow:hidden}
.ph-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#f87171,#fbbf24,#4ade80,#60a5fa,#818cf8);width:100%}
.ph-marker{position:absolute;top:-2px;width:2px;height:10px;background:white;border-radius:1px;transform:translateX(-50%)}
.ph-labels{display:flex;justify-content:space-between;font-size:.6rem;color:var(--text-muted);margin-top:4px}
.loading{display:flex;align-items:center;justify-content:center;padding:60px 20px;flex-direction:column;gap:16px;color:var(--text-muted);font-size:.75rem;letter-spacing:.1em}
.loading-ring{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 1s linear infinite}
.error-state{text-align:center;padding:40px 20px;color:var(--text-muted);font-size:.75rem;line-height:1.8}
.error-state strong{color:var(--red);display:block;margin-bottom:8px}
.summary-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.summary-pill{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:.68rem;color:var(--text-dim);display:flex;align-items:center;gap:6px}
.channel-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px}
.channel-btn{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 4px;text-align:center;font-size:.65rem;color:var(--text-muted);cursor:pointer;transition:all .2s;font-family:'DM Mono',monospace}
.channel-btn.on{background:rgba(74,222,128,.1);border-color:var(--green-dark);color:var(--green)}
.timestamp{font-size:.62rem;color:var(--text-muted)}

/* Config panel */
.config-panel{background:var(--surface);border:1px solid var(--amber);border-radius:12px;padding:24px;margin-bottom:24px}
.config-title{color:var(--amber);font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;margin-bottom:16px}
.config-field{margin-bottom:12px}
.config-label{font-size:.65rem;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;display:block}
.config-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:10px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:.78rem;outline:none;transition:border-color .2s}
.config-input:focus{border-color:var(--green-dark)}
.config-save{background:var(--green-dark);border:1px solid var(--green);color:var(--green);padding:10px 20px;border-radius:6px;font-family:'DM Mono',monospace;font-size:.75rem;cursor:pointer;letter-spacing:.05em;width:100%;margin-top:8px;transition:all .2s}
.config-save:hover{background:rgba(74,222,128,.2)}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="logo"><div class="logo-dot"></div>Jardin Vivant</div>
    <div class="header-status" id="headerStatus">— initialisation</div>
    <button class="refresh-btn" id="refreshBtn" onclick="refreshAll()">↻</button>
  </div>
</header>
<main>
  <div class="nav-tabs">
    <button class="tab active" onclick="showTab('dashboard',this)">Dashboard</button>
    <button class="tab" onclick="showTab('serre',this)">Serre</button>
    <button class="tab" onclick="showTab('appareils',this)">Appareils</button>
    <button class="tab" onclick="showTab('config',this)">Config</button>
  </div>

  <div class="section active" id="tab-dashboard">
    <div class="summary-row" id="summaryRow"><div class="summary-pill"><span class="dot dot-gray"></span>Chargement…</div></div>
    <div class="section-title">Capteurs <span>SmartLife / Tuya</span></div>
    <div class="grid-3 mb-24" id="dashCards"><div class="loading"><div class="loading-ring"></div>Connexion…</div></div>
    <div class="section-title">Serre aquaponique <span>MyFood #703</span></div>
    <div class="grid-3" id="dashSerre"><div class="loading"><div class="loading-ring"></div>Lecture MyFood…</div></div>
  </div>

  <div class="section" id="tab-serre">
    <div class="section-title">Serre aquaponique <span>MyFood City — #703</span></div>
    <div class="grid-3 mb-16" id="serreCards"><div class="loading"><div class="loading-ring"></div></div></div>
    <div class="section-title">Historique <span>Dernières mesures</span></div>
    <div id="serreHistory"></div>
  </div>

  <div class="section" id="tab-appareils">
    <div class="section-title">Appareils connectés <span>SmartLife / Tuya</span></div>
    <div class="summary-row" id="deviceSummary"></div>
    <div class="grid-3" id="deviceGrid"><div class="loading"><div class="loading-ring"></div>Chargement…</div></div>
  </div>

  <div class="section" id="tab-config">
    <div class="section-title">Configuration <span>API & Connexions</span></div>
    <div class="config-panel">
      <div class="config-title">⚙ Identifiants Tuya IoT</div>
      <div class="config-field">
        <label class="config-label">Access ID (Client ID)</label>
        <input class="config-input" id="cfg-client-id" type="text" placeholder="ex: dh477mcsk3g5g7mgant4">
      </div>
      <div class="config-field">
        <label class="config-label">Access Secret</label>
        <input class="config-input" id="cfg-client-secret" type="password" placeholder="ex: 4796dbf461204fddb5a319b08d783e4c">
      </div>
      <div class="config-field">
        <label class="config-label">ID Serre MyFood</label>
        <input class="config-input" id="cfg-myfood-id" type="text" placeholder="ex: 703">
      </div>
      <button class="config-save" onclick="saveConfig()">Enregistrer et connecter</button>
    </div>
    <div id="configStatus"></div>
  </div>
</main>

<script>
// ── Config stockée localement ──────────────────────────────
function loadConfig() {
  return {
    clientId: localStorage.getItem('tuya_client_id') || '',
    clientSecret: localStorage.getItem('tuya_client_secret') || '',
    myfoodId: localStorage.getItem('myfood_id') || '703',
  };
}

function saveConfig() {
  const id = document.getElementById('cfg-client-id').value.trim();
  const secret = document.getElementById('cfg-client-secret').value.trim();
  const mf = document.getElementById('cfg-myfood-id').value.trim();
  if (!id || !secret) { alert('Remplis les deux champs Tuya.'); return; }
  localStorage.setItem('tuya_client_id', id);
  localStorage.setItem('tuya_client_secret', secret);
  localStorage.setItem('myfood_id', mf || '703');
  document.getElementById('configStatus').innerHTML = '<div class="summary-pill" style="color:var(--green)"><span class="dot dot-green"></span>Sauvegardé — actualisation…</div>';
  refreshAll();
}

function initConfigFields() {
  const c = loadConfig();
  document.getElementById('cfg-client-id').value = c.clientId;
  document.getElementById('cfg-client-secret').value = c.clientSecret;
  document.getElementById('cfg-myfood-id').value = c.myfoodId;
}

// ── État global ────────────────────────────────────────────
let devices = [];
let myFoodData = [];
let lastRefresh = null;
let tuyaToken = null;
let tokenExpiry = 0;

// ── Navigation ─────────────────────────────────────────────
function showTab(name, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

// ── Crypto ─────────────────────────────────────────────────
async function hmacSha256(msg, secret) {
  const enc = new TextEncoder();
  const key = await crypto.subtle.importKey('raw', enc.encode(secret), {name:'HMAC',hash:'SHA-256'}, false, ['sign']);
  const sig = await crypto.subtle.sign('HMAC', key, enc.encode(msg));
  return Array.from(new Uint8Array(sig)).map(b=>b.toString(16).padStart(2,'0')).join('').toUpperCase();
}
async function sha256hex(msg) {
  const hash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ── Tuya API ───────────────────────────────────────────────
const TUYA_BASE = 'https://openapi.tuyaeu.com';

async function getToken() {
  if (tuyaToken && Date.now() < tokenExpiry) return tuyaToken;
  const cfg = loadConfig();
  const t = Date.now().toString();
  const sign = await hmacSha256(cfg.clientId + t, cfg.clientSecret);
  const res = await fetch(TUYA_BASE + '/v1.0/token?grant_type=1', {
    headers: {client_id:cfg.clientId, t, sign, sign_method:'HMAC-SHA256', nonce:''}
  });
  const data = await res.json();
  if (!data.success) throw new Error('Auth Tuya: ' + (data.msg||data.code));
  tuyaToken = data.result.access_token;
  tokenExpiry = Date.now() + (data.result.expire_time * 1000) - 60000;
  return tuyaToken;
}

async function tuyaGet(path) {
  const cfg = loadConfig();
  const token = await getToken();
  const t = Date.now().toString();
  const strToSign = cfg.clientId + token + t + 'GET\n\n\n' + path;
  const sign = await hmacSha256(strToSign, cfg.clientSecret);
  const res = await fetch(TUYA_BASE + path, {
    headers: {client_id:cfg.clientId, access_token:token, t, sign, sign_method:'HMAC-SHA256', nonce:''}
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

async function tuyaPost(path, body) {
  const cfg = loadConfig();
  const token = await getToken();
  const t = Date.now().toString();
  const bodyStr = JSON.stringify(body);
  const bodyHash = await sha256hex(bodyStr);
  const strToSign = cfg.clientId + token + t + 'POST\n' + bodyHash + '\n\n' + path;
  const sign = await hmacSha256(strToSign, cfg.clientSecret);
  const res = await fetch(TUYA_BASE + path, {
    method:'POST',
    headers: {client_id:cfg.clientId, access_token:token, t, sign, sign_method:'HMAC-SHA256', 'Content-Type':'application/json', nonce:''},
    body: bodyStr
  });
  return res.json();
}

async function loadTuyaDevices() {
  const data = await tuyaGet('/v1.0/iot-01/associated-users/devices?size=100');
  if (!data.success) throw new Error(data.msg || 'Erreur Tuya devices');
  devices = data.result?.devices || [];
  // Load statuses in parallel
  await Promise.all(devices.map(async d => {
    try {
      const s = await tuyaGet('/v1.0/devices/' + d.id + '/status');
      if (s.success) d.status_list = s.result;
    } catch(e) {}
  }));
}

// ── MyFood API ─────────────────────────────────────────────
async function loadMyFood() {
  const cfg = loadConfig();
  const res = await fetch('https://hub.myfood.eu/opendata/productionunits/' + cfg.myfoodId + '/measures');
  if (!res.ok) throw new Error('MyFood HTTP ' + res.status);
  myFoodData = await res.json();
}

// ── Helpers ────────────────────────────────────────────────
function getStat(device, code) {
  return device.status_list?.find(x=>x.code===code)?.value ?? null;
}

function getCategory(device) {
  const n=(device.name||'').toLowerCase(), c=(device.category||'').toLowerCase();
  if (n.includes('commutateur')||n.includes('switch')||n.includes('canal')||c==='kg') return 'switch';
  if (n.includes('temp')||n.includes('humid')||c==='wk') return 'sensor';
  return 'other';
}

function formatTime(d) {
  if (!d) return '';
  try { return new Date(d).toLocaleString('fr-FR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}); }
  catch(e) { return ''; }
}

function formatType(t) {
  const m = {AirTemperature:'Temp. air',WaterTemperature:'Temp. eau',Humidity:'Humidité',Ph:'pH',PH:'pH',WaterLevel:'Niveau eau',Luminosity:'Luminosité'};
  return m[t] || t;
}

function getUnit(t) {
  const tl=t.toLowerCase();
  if (tl.includes('temp')) return '°C';
  if (tl.includes('ph')) return 'pH';
  if (tl.includes('humid')) return '%';
  if (tl.includes('level')||tl.includes('eau')) return 'cm';
  if (tl.includes('lumi')) return 'lux';
  return '';
}

function phDot(type, val) {
  if (!type.toLowerCase().includes('ph')) return 'dot-green';
  if (val>=6&&val<=7.5) return 'dot-green';
  if (val>=5.5) return 'dot-amber';
  return 'dot-red';
}

// ── Render MyFood ──────────────────────────────────────────
function renderMyFood(elId) {
  const el = document.getElementById(elId);
  if (!myFoodData?.length) {
    el.innerHTML='<div class="error-state"><strong>MyFood non disponible</strong>Vérifie ta connexion.</div>';
    return;
  }
  const types={};
  myFoodData.forEach(m=>{
    const t=m.captorType||m.measureType||m.type||'?';
    if(!types[t]) types[t]=[];
    types[t].push(m);
  });
  el.innerHTML = Object.entries(types).map(([type,arr])=>{
    const m=arr.sort((a,b)=>new Date(b.logTime||b.date||0)-new Date(a.logTime||a.date||0))[0];
    const val=m.value!==undefined?m.value:m.mesure;
    const num=val!=null?Number(val):null;
    const isPh=type.toLowerCase().includes('ph');
    return `<div class="card">
      <div class="card-label"><span class="dot ${phDot(type,num)}"></span>${formatType(type)}</div>
      <div class="card-value">${num!=null?num.toFixed(1):'—'}</div>
      <div class="card-unit">${getUnit(type)}</div>
      ${isPh&&num!=null?`<div class="ph-bar"><div class="ph-fill"></div><div class="ph-marker" style="left:${Math.min(100,Math.max(0,(num/14)*100))}%"></div></div><div class="ph-labels"><span>0</span><span>7</span><span>14</span></div>`:''}
      <div class="card-sub timestamp">${formatTime(m.logTime||m.date)}</div>
    </div>`;
  }).join('');
}

// ── Render Devices ─────────────────────────────────────────
function renderDeviceCard(d) {
  const cat=getCategory(d);
  if (cat==='switch') {
    const chs=['switch_1','switch_2','switch_3','switch_4'].filter(c=>d.status_list?.some(x=>x.code===c));
    const onCount=chs.filter(c=>getStat(d,c)).length;
    return `<div class="device-card">
      <div class="device-header"><div><div class="device-name">${d.name}</div><div class="device-type">Commutateur ${chs.length} canaux</div></div><span class="dot ${d.online?'dot-green':'dot-gray'}"></span></div>
      <div class="channel-row">${chs.map((c,i)=>{const on=getStat(d,c);return`<div class="channel-btn ${on?'on':''}" onclick="toggleCh('${d.id}','${c}',${!on})">C${i+1}<br>${on?'●':'○'}</div>`;}).join('')}</div>
      <div class="card-sub">${onCount}/${chs.length} actifs</div>
    </div>`;
  }
  if (cat==='sensor') {
    const temp=getStat(d,'va_temperature')??getStat(d,'temp_current');
    const hum=getStat(d,'va_humidity')??getStat(d,'humidity_value');
    return `<div class="device-card">
      <div class="device-header"><div><div class="device-name">${d.name}</div><div class="device-type">Capteur</div></div><span class="dot ${d.online?'dot-green':'dot-gray'}"></span></div>
      <div style="display:flex;gap:16px;margin-top:4px">
        ${temp!=null?`<div><div style="font-family:'Fraunces',serif;font-size:1.6rem;font-weight:300">${(temp/10).toFixed(1)}°</div><div style="font-size:.6rem;color:var(--text-muted);letter-spacing:.1em">TEMP</div></div>`:''}
        ${hum!=null?`<div><div style="font-family:'Fraunces',serif;font-size:1.6rem;font-weight:300">${hum}%</div><div style="font-size:.6rem;color:var(--text-muted);letter-spacing:.1em">HUMID</div></div>`:''}
      </div>
    </div>`;
  }
  const sw=getStat(d,'switch')??getStat(d,'switch_1');
  return `<div class="device-card">
    <div class="device-header">
      <div><div class="device-name">${d.name}</div><div class="device-type">${d.category||'appareil'}</div></div>
      ${sw!=null?`<label class="toggle"><input type="checkbox" ${sw?'checked':''} onchange="toggleDev('${d.id}','switch',this.checked)"><span class="toggle-slider"></span></label>`:`<span class="dot ${d.online?'dot-green':'dot-gray'}"></span>`}
    </div>
    <div class="card-sub">${d.online?'<span class="status-ok">En ligne</span>':'<span class="status-err">Hors ligne</span>'}</div>
  </div>`;
}

function renderDevices() {
  const el=document.getElementById('deviceGrid');
  if (!devices.length) { el.innerHTML='<div class="error-state"><strong>Aucun appareil</strong>Vérifie la liaison SmartLife dans Tuya IoT.</div>'; return; }
  el.innerHTML=devices.map(renderDeviceCard).join('');
  const online=devices.filter(d=>d.online).length;
  document.getElementById('deviceSummary').innerHTML=`
    <div class="summary-pill"><span class="dot dot-green"></span>${online} en ligne</div>
    <div class="summary-pill"><span class="dot dot-gray"></span>${devices.length-online} hors ligne</div>
    <div class="summary-pill">${devices.length} appareils</div>`;
}

function renderDashboard() {
  const online=devices.filter(d=>d.online).length;
  document.getElementById('summaryRow').innerHTML=`
    <div class="summary-pill"><span class="dot dot-green"></span>${online}/${devices.length} en ligne</div>
    <div class="summary-pill timestamp">↻ ${lastRefresh?formatTime(lastRefresh):'—'}</div>`;
  const dc=document.getElementById('dashCards');
  if (devices.length) {
    const show=[...devices.filter(d=>getCategory(d)==='sensor'),...devices.filter(d=>getCategory(d)==='switch')].slice(0,6);
    dc.innerHTML=show.map(d=>{
      const cat=getCategory(d);
      if (cat==='sensor') {
        const temp=getStat(d,'va_temperature')??getStat(d,'temp_current');
        const hum=getStat(d,'va_humidity')??getStat(d,'humidity_value');
        return `<div class="card"><div class="card-label"><span class="dot ${d.online?'dot-green':'dot-gray'}"></span>${d.name}</div>${temp!=null?`<div class="card-value">${(temp/10).toFixed(1)}°</div><div class="card-unit">°C</div>`:''} ${hum!=null?`<div class="card-sub">${hum}% humidité</div>`:''}</div>`;
      }
      const chs=['switch_1','switch_2','switch_3','switch_4'].filter(c=>d.status_list?.some(x=>x.code===c));
      const onCount=chs.filter(c=>getStat(d,c)).length;
      return `<div class="card"><div class="card-label"><span class="dot ${d.online?'dot-green':'dot-gray'}"></span>${d.name}</div><div class="card-value" style="font-size:1.6rem">${onCount}<span style="font-size:1rem;color:var(--text-muted)">/${chs.length}</span></div><div class="card-unit">canaux actifs</div></div>`;
    }).join('');
  } else {
    dc.innerHTML='<div class="error-state"><strong>Non connecté</strong>Va dans Config pour entrer tes identifiants Tuya.</div>';
  }
  renderMyFood('dashSerre');
}

function renderSerre() {
  renderMyFood('serreCards');
  const el=document.getElementById('serreHistory');
  if (!myFoodData?.length) { el.innerHTML=''; return; }
  const recent=[...myFoodData].sort((a,b)=>new Date(b.logTime||b.date||0)-new Date(a.logTime||a.date||0)).slice(0,20);
  el.innerHTML=`<div class="card" style="overflow:auto"><table style="width:100%;border-collapse:collapse;font-size:.72rem">
    <thead><tr style="color:var(--text-muted);border-bottom:1px solid var(--border)">
      <th style="text-align:left;padding:8px 4px;font-weight:400">TYPE</th>
      <th style="text-align:right;padding:8px 4px;font-weight:400">VALEUR</th>
      <th style="text-align:right;padding:8px 4px;font-weight:400">DATE</th>
    </tr></thead>
    <tbody>${recent.map(m=>`<tr style="border-bottom:1px solid rgba(42,64,48,.4)">
      <td style="padding:8px 4px;color:var(--text-dim)">${formatType(m.captorType||m.measureType||m.type||'—')}</td>
      <td style="padding:8px 4px;text-align:right;font-family:'Fraunces',serif;font-size:1rem">${m.value!=null?Number(m.value).toFixed(2):'—'}</td>
      <td style="padding:8px 4px;text-align:right;color:var(--text-muted)">${formatTime(m.logTime||m.date)}</td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

// ── Commandes ──────────────────────────────────────────────
async function toggleCh(id, code, val) {
  try {
    const ok=await tuyaPost('/v1.0/devices/'+id+'/commands',{commands:[{code,value:val}]});
    if (ok.success) {
      const d=devices.find(x=>x.id===id);
      if (d?.status_list){const s=d.status_list.find(x=>x.code===code);if(s)s.value=val;}
      renderDevices(); renderDashboard();
    }
  } catch(e) { console.error(e); }
}

async function toggleDev(id, code, val) {
  try { await tuyaPost('/v1.0/devices/'+id+'/commands',{commands:[{code,value:val}]}); }
  catch(e) { console.error(e); }
}

// ── Refresh principal ──────────────────────────────────────
async function refreshAll() {
  const cfg=loadConfig();
  if (!cfg.clientId || !cfg.clientSecret) {
    document.getElementById('headerStatus').innerHTML='<span class="status-warn">Config requise</span>';
    document.getElementById('dashCards').innerHTML='<div class="error-state"><strong>Non configuré</strong>Va dans l\'onglet Config pour entrer tes identifiants Tuya.</div>';
    return;
  }
  const btn=document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  document.getElementById('headerStatus').innerHTML='<span class="status-ok">Actualisation…</span>';
  let tuyaOk=false, mfOk=false;
  try { await loadTuyaDevices(); tuyaOk=true; } catch(e) { console.error('Tuya:',e); }
  try { await loadMyFood(); mfOk=true; } catch(e) { console.error('MyFood:',e); }
  lastRefresh=new Date().toISOString();
  renderDashboard();
  renderDevices();
  renderSerre();
  const online=devices.filter(d=>d.online).length;
  if (tuyaOk&&mfOk) {
    document.getElementById('headerStatus').innerHTML=`<span class="status-ok">↑ ${online}/${devices.length}</span>`;
  } else if (tuyaOk) {
    document.getElementById('headerStatus').innerHTML=`<span class="status-warn">Tuya OK · MyFood ✗</span>`;
  } else if (mfOk) {
    document.getElementById('headerStatus').innerHTML=`<span class="status-warn">MyFood OK · Tuya ✗</span>`;
  } else {
    document.getElementById('headerStatus').innerHTML='<span class="status-err">Erreur connexion</span>';
  }
  btn.classList.remove('spinning');
}
